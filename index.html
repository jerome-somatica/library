<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1e25">
<title>Somatica Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Inter', sans-serif; background: #0d1e25; color: #ebd3a0; min-height: 100vh; }
body { padding-bottom: 140px; }

/* Header */
header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(13, 30, 37, 0.95); backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(235, 211, 160, 0.15);
  padding: 14px 20px;
}
header .title {
  font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
}
header .count { font-size: 13px; opacity: 0.6; font-weight: 400; }

/* Filters bar */
.filters {
  background: rgba(235, 211, 160, 0.03);
  border-bottom: 1px solid rgba(235, 211, 160, 0.1);
}
.filters-row {
  padding: 10px 20px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.filters-row + .filters-row { border-top: 1px dashed rgba(235, 211, 160, 0.08); }
.filters input, .filters select {
  background: rgba(235, 211, 160, 0.08); color: #ebd3a0;
  border: 1px solid rgba(235, 211, 160, 0.15);
  padding: 7px 11px; border-radius: 6px; font-size: 13px; font-family: inherit;
  outline: none; transition: border-color 0.15s;
}
.filters input:focus, .filters select:focus { border-color: #ebd3a0; }
.filters input::placeholder { color: rgba(235, 211, 160, 0.5); }
.filters input[type="search"] { flex: 1; min-width: 180px; }
.filters .count-filtered {
  font-size: 12px; opacity: 0.75; margin-left: auto;
  font-variant-numeric: tabular-nums;
}
.filters .count-filtered b { color: #ebd3a0; font-weight: 600; }

/* Chip group (toggles) */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(235, 211, 160, 0.06);
  border: 1px solid rgba(235, 211, 160, 0.15);
  color: rgba(235, 211, 160, 0.75);
  padding: 6px 11px; border-radius: 999px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  transition: all 0.15s; user-select: none;
}
.chip:hover { border-color: rgba(235, 211, 160, 0.35); color: #ebd3a0; }
.chip.active {
  background: #ebd3a0; color: #0f2f3a;
  border-color: #ebd3a0;
}
.chip.primary-chip {
  background: rgba(235, 211, 160, 0.12);
  border-color: rgba(235, 211, 160, 0.3);
  color: #ebd3a0;
}
.chip.primary-chip.active {
  background: #a8e6a8; border-color: #a8e6a8; color: #0a2a0a;
}

/* Quality slider */
.slider-wrap {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(235, 211, 160, 0.06);
  border: 1px solid rgba(235, 211, 160, 0.15);
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px;
}
.slider-wrap label { color: rgba(235,211,160,0.7); font-weight: 500; }
.slider-wrap input[type="range"] {
  width: 90px; accent-color: #ebd3a0;
  background: transparent; border: 0; padding: 0;
}
.slider-wrap .val {
  color: #ebd3a0; font-weight: 600; min-width: 24px; text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Multi-select container */
.multi-select {
  position: relative;
  display: inline-block;
}
.multi-select-btn {
  background: rgba(235, 211, 160, 0.08);
  border: 1px solid rgba(235, 211, 160, 0.15);
  color: #ebd3a0;
  padding: 7px 11px; border-radius: 6px; font-size: 13px;
  cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; gap: 6px;
}
.multi-select-btn:hover { border-color: rgba(235, 211, 160, 0.35); }
.multi-select-btn .caret { font-size: 9px; opacity: 0.6; }
.multi-select-btn.has-selection {
  background: rgba(235, 211, 160, 0.18);
  border-color: #ebd3a0;
}
.multi-select-panel {
  display: none;
  position: absolute; top: calc(100% + 4px); left: 0; z-index: 30;
  min-width: 220px; max-width: 320px; max-height: 280px; overflow-y: auto;
  background: #0f2f3a; border: 1px solid rgba(235, 211, 160, 0.25);
  border-radius: 8px; padding: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.45);
}
.multi-select.open .multi-select-panel { display: block; }
.multi-select-panel .opt {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 4px; cursor: pointer;
  font-size: 13px; color: rgba(235, 211, 160, 0.85);
  transition: background 0.1s;
}
.multi-select-panel .opt:hover { background: rgba(235, 211, 160, 0.08); }
.multi-select-panel .opt.selected { color: #ebd3a0; background: rgba(235, 211, 160, 0.12); }
.multi-select-panel .opt .tick {
  width: 14px; height: 14px; border-radius: 3px;
  border: 1.5px solid rgba(235, 211, 160, 0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: bold;
}
.multi-select-panel .opt.selected .tick {
  background: #ebd3a0; border-color: #ebd3a0; color: #0f2f3a;
}
.multi-select-panel .opt .cnt { margin-left: auto; opacity: 0.5; font-size: 11px; }

/* Reset button */
.btn-reset {
  background: transparent; color: rgba(235, 211, 160, 0.7);
  border: 1px dashed rgba(235, 211, 160, 0.25);
  padding: 6px 11px; border-radius: 6px; font-size: 12px;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.btn-reset:hover { color: #ebd3a0; border-color: #ebd3a0; border-style: solid; }

/* Zoom control (segmented buttons) */
.zoom-control {
  display: inline-flex; gap: 2px;
  background: rgba(235,211,160,0.08);
  border: 1px solid rgba(235,211,160,0.12);
  border-radius: 8px; padding: 2px;
}
.zoom-control button {
  background: transparent; border: 0; color: rgba(235,211,160,0.55);
  padding: 5px 9px; font-size: 12px; font-weight: 600;
  font-family: inherit; border-radius: 6px; cursor: pointer;
  min-width: 30px; transition: background 0.12s, color 0.12s;
}
.zoom-control button.active { background: rgba(235,211,160,0.22); color: #ebd3a0; }
.zoom-control button:active { transform: scale(0.95); }

/* Gallery grid — piloté par --cols */
:root { --cols: 3; --gap: 12px; }
@media (max-width: 767px) { :root { --cols: 2; --gap: 8px; } }

.gallery {
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(var(--cols), 1fr);
  gap: var(--gap);
  touch-action: pan-y;
}
@media (min-width: 768px) {
  .gallery { padding: 20px; --gap: 14px; }
}

.gallery[data-dense="1"] .card .info { padding: 6px 8px; font-size: 11px; }
.gallery[data-dense="1"] .card .info .meta { display: none; }
.gallery[data-dense="2"] .card .info { display: none; }
.gallery[data-dense="2"] .card .status-badge { font-size: 8px; padding: 1px 5px; }
.gallery[data-dense="2"] .card .duration { font-size: 9px; padding: 1px 5px; }
.gallery[data-dense="2"] .card .select-checkbox { width: 20px; height: 20px; }

.card {
  position: relative; background: #0f2f3a; border-radius: 10px; overflow: hidden;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  border: 2px solid transparent;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
.card.selected { border-color: #ebd3a0; box-shadow: 0 0 0 2px rgba(235, 211, 160, 0.4); }
.card.archived { opacity: 0.45; }
.card.rejected { opacity: 0.35; filter: grayscale(0.8); }

.card .thumb {
  width: 100%; aspect-ratio: 9/16; background: #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: rgba(235,211,160,0.25);
  position: relative;
}
.card .thumb img, .card .thumb video {
  width: 100%; height: 100%; object-fit: cover;
}
.card .thumb img { display: block; background: #000; }
.card .thumb .play-icon {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.card .thumb .play-icon::after {
  content: ''; display: block;
  border-left: 14px solid #ebd3a0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  margin-left: 4px;
}
.card .duration {
  position: absolute; bottom: 8px; right: 8px;
  background: rgba(0,0,0,0.75); color: #ebd3a0;
  padding: 2px 6px; border-radius: 4px;
  font-size: 11px; font-weight: 500; font-variant-numeric: tabular-nums;
}
.card .usable-badge {
  position: absolute; bottom: 8px; left: 8px;
  background: rgba(168, 230, 168, 0.9); color: #0a2a0a;
  padding: 2px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.03em;
}
.card .quality-score {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,0.75); color: #ebd3a0;
  padding: 2px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 600;
}
.card .status-badge {
  position: absolute; top: 32px; right: 8px;
  padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
}
.card .status-badge.pending { background: rgba(255, 200, 100, 0.85); color: #3a2a10; }
.card .status-badge.in_progress { background: rgba(100, 180, 255, 0.85); color: #0a1d2a; }
.card .status-badge.done { display: none; }
.card .status-badge.failed { background: rgba(255, 100, 100, 0.85); color: #3a0a0a; }
.card .info {
  padding: 8px 10px;
  font-size: 12px;
}
.card .info .amb { color: #ebd3a0; font-weight: 500; text-transform: capitalize; }
.card .info .meta { color: rgba(235,211,160,0.55); font-size: 11px; margin-top: 2px; }

/* Selection checkbox overlay */
.card .select-checkbox {
  position: absolute; top: 8px; left: 8px;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,0,0,0.5); border: 2px solid #ebd3a0;
  display: flex; align-items: center; justify-content: center;
  color: #ebd3a0; font-size: 14px; font-weight: bold;
  cursor: pointer;
  transition: all 0.15s;
  z-index: 2;
}
.card.selected .select-checkbox { background: #ebd3a0; color: #0f2f3a; }

/* Sentinel (infinite scroll trigger) */
.sentinel {
  grid-column: 1 / -1;
  padding: 30px 10px; text-align: center;
  color: rgba(235,211,160,0.5); font-size: 13px; font-style: italic;
}

/* Modal */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; z-index: 100; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-bg.active { display: flex; }
.modal {
  background: #0f2f3a; border-radius: 14px; max-width: 720px; width: 100%;
  max-height: 90vh; overflow: auto;
  border: 1px solid rgba(235,211,160,0.2);
}
.modal-header { padding: 16px 20px; border-bottom: 1px solid rgba(235,211,160,0.1); display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; }
.modal-header .close {
  background: none; border: none; color: #ebd3a0; font-size: 28px; cursor: pointer;
  width: 36px; height: 36px; border-radius: 50%;
}
.modal-header .close:hover { background: rgba(235,211,160,0.1); }
.modal-video {
  width: 100%; aspect-ratio: 9/16; max-height: 60vh;
  background: #000; display: flex; align-items: center; justify-content: center;
}
.modal-video video { width: 100%; height: 100%; object-fit: contain; }
.modal-body { padding: 20px; }
.modal-body .row { display: flex; gap: 12px; margin-bottom: 10px; font-size: 14px; }
.modal-body .row .label { font-weight: 500; color: rgba(235,211,160,0.6); min-width: 100px; }
.modal-body .row .value { flex: 1; }
.modal-body textarea, .modal-body input {
  width: 100%; background: rgba(235, 211, 160, 0.08); color: #ebd3a0;
  border: 1px solid rgba(235, 211, 160, 0.15);
  padding: 8px 10px; border-radius: 6px; font-size: 14px; font-family: inherit;
  outline: none;
}
.modal-body textarea { min-height: 60px; resize: vertical; }
.modal-actions { padding: 14px 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; border-top: 1px solid rgba(235,211,160,0.1); }
button.btn {
  background: rgba(235, 211, 160, 0.1); color: #ebd3a0;
  border: 1px solid rgba(235, 211, 160, 0.25); cursor: pointer;
  padding: 9px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
  font-family: inherit; transition: all 0.15s;
}
button.btn:hover { background: rgba(235, 211, 160, 0.2); border-color: rgba(235, 211, 160, 0.4); }
button.btn.primary { background: #ebd3a0; color: #0f2f3a; border-color: #ebd3a0; }
button.btn.primary:hover { background: #d6be8c; }
button.btn.danger { color: #ff9a9a; border-color: rgba(255, 150, 150, 0.3); }
button.btn.danger:hover { background: rgba(255, 100, 100, 0.15); }

/* Auth screen */
.auth-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
}
.auth-box {
  background: #0f2f3a; padding: 40px 30px; border-radius: 14px;
  max-width: 420px; width: 100%; border: 1px solid rgba(235,211,160,0.15);
}
.auth-box h1 {
  font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 500; margin-bottom: 8px;
}
.auth-box p.subtitle { color: rgba(235,211,160,0.6); margin-bottom: 24px; font-size: 14px; }
.auth-box input { width: 100%; margin-bottom: 14px; padding: 12px 14px; font-size: 15px;
  background: rgba(235, 211, 160, 0.08); color: #ebd3a0;
  border: 1px solid rgba(235, 211, 160, 0.15); border-radius: 8px; outline: none;
}
.auth-box button { width: 100%; padding: 12px; font-size: 15px; font-weight: 500;
  background: #ebd3a0; color: #0f2f3a; border: none; border-radius: 8px; cursor: pointer;
}
.auth-box button:hover { background: #d6be8c; }
.auth-box .msg { font-size: 13px; margin-top: 14px; color: rgba(235,211,160,0.7); text-align: center; }
.auth-box .msg.error { color: #ff9a9a; }

/* Selection bar (bottom) */
.selection-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(13, 30, 37, 0.98); backdrop-filter: blur(10px);
  border-top: 2px solid #ebd3a0;
  padding: 14px 20px; display: none; z-index: 40;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
}
.selection-bar.active { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
.selection-bar .count { font-weight: 600; font-size: 16px; }
.selection-bar .meta { opacity: 0.7; font-size: 13px; }
.selection-bar .actions { margin-left: auto; display: flex; gap: 10px; }

/* Loading */
.loading {
  text-align: center; padding: 60px 20px; color: rgba(235,211,160,0.5);
  font-style: italic;
}

/* Empty state */
.empty-state {
  grid-column: 1 / -1;
  text-align: center; padding: 80px 20px; color: rgba(235,211,160,0.5);
}
.empty-state h2 { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-bottom: 10px; color: #ebd3a0; }

/* Toast */
.toast {
  position: fixed; top: 20px; right: 20px; z-index: 200;
  background: rgba(15, 47, 58, 0.95); backdrop-filter: blur(10px);
  border: 1px solid rgba(235, 211, 160, 0.3); border-radius: 8px;
  padding: 12px 18px; font-size: 14px; color: #ebd3a0;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  animation: slideIn 0.2s ease-out;
}
.toast.error { border-color: rgba(255, 150, 150, 0.4); color: #ff9a9a; }
.toast.success { border-color: rgba(150, 220, 150, 0.4); color: #a8e6a8; }
@keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

/* Mobile adjustments : filtres secondaires cachés par défaut */
@media (max-width: 767px) {
  .filters-row.secondary { display: none; }
  .filters-row.secondary.open { display: flex; }
  .filters-toggle-secondary {
    margin-left: auto;
  }
}
@media (min-width: 768px) {
  .filters-toggle-secondary { display: none; }
}
</style>
</head>
<body>

<div id="auth-screen" class="auth-screen" style="display:none">
  <div class="auth-box">
    <h1>Somatica Library</h1>
    <p class="subtitle">Ta banque de clips vidéo pour les Reels</p>
    <div id="step-email">
      <input type="email" id="email-input" placeholder="ton@email.com" autocomplete="email">
      <button id="send-link">Recevoir un code</button>
    </div>
    <div id="step-code" style="display:none">
      <input type="text" id="code-input" placeholder="Code à 8 chiffres" inputmode="numeric" autocomplete="one-time-code" maxlength="8">
      <button id="verify-code">Se connecter</button>
      <div style="text-align:center;margin-top:10px;"><a href="#" id="change-email" style="color:rgba(235,211,160,0.6);font-size:13px;text-decoration:none;">Changer d'email</a></div>
    </div>
    <div class="msg" id="auth-msg"></div>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <div class="title">
      Somatica Library
      <span class="count" id="total-count">chargement...</span>
    </div>
  </header>

  <div class="filters">
    <!-- Ligne 1 : recherche + essentiels -->
    <div class="filters-row">
      <input type="search" id="search-input" placeholder="Rechercher description, tags, transcript...">

      <select id="sort-select" title="Trier par">
        <option value="source_desc">📅 Plus récent (source)</option>
        <option value="upload_desc">⬆️ Plus récent (upload)</option>
        <option value="quality_desc">⭐ Qualité ↓</option>
        <option value="duration_asc">⏱️ Durée ↑</option>
        <option value="duration_desc">⏱️ Durée ↓</option>
      </select>

      <div class="chip primary-chip" id="usable-reel" title="Usable pour Reel">
        <span>✨</span> Prêt Reel
      </div>

      <div class="slider-wrap" title="Qualité minimum">
        <label for="quality-slider">⭐ ≥</label>
        <input type="range" id="quality-slider" min="0" max="10" step="1" value="0">
        <span class="val" id="quality-val">0</span>
      </div>

      <select id="persons-filter" title="Personnes">
        <option value="">Toutes personnes</option>
        <option value="0">Sans personne</option>
        <option value="1">1 personne</option>
        <option value="2+">2+ personnes</option>
      </select>

      <select id="intensity-filter" title="Intensité émotionnelle">
        <option value="">Toutes intensités</option>
        <option value="calm">Calme</option>
        <option value="neutral">Neutre</option>
        <option value="intense">Intense</option>
      </select>

      <div class="chip" id="chip-music-with" data-value="with">🎵 Musique</div>
      <div class="chip" id="chip-music-without" data-value="without">🔇 Sans musique</div>
      <div class="chip" id="chip-speech-with" data-value="with">💬 Paroles</div>
      <div class="chip" id="chip-speech-without" data-value="without">🤫 Sans paroles</div>

      <button class="btn-reset filters-toggle-secondary" id="toggle-secondary">Plus de filtres ↓</button>
    </div>

    <!-- Ligne 2 : multi-selects + secondaires -->
    <div class="filters-row secondary">
      <div class="multi-select" data-filter="emotions">
        <button class="multi-select-btn" id="emotions-btn">
          <span>Émotion</span> <span class="caret">▼</span>
        </button>
        <div class="multi-select-panel" id="emotions-panel"></div>
      </div>

      <div class="multi-select" data-filter="tags">
        <button class="multi-select-btn" id="tags-btn">
          <span>Tags</span> <span class="caret">▼</span>
        </button>
        <div class="multi-select-panel" id="tags-panel"></div>
      </div>

      <select id="ambiance-filter">
        <option value="">Toutes ambiances</option>
      </select>

      <select id="movement-filter">
        <option value="">Tous mouvements</option>
      </select>

      <select id="lighting-filter">
        <option value="">Tous éclairages</option>
      </select>

      <select id="location-filter">
        <option value="">Tous lieux</option>
      </select>

      <select id="duration-filter">
        <option value="">Toutes durées</option>
        <option value="short">Courte (0-15s)</option>
        <option value="medium">Moyenne (15-60s)</option>
        <option value="long">Longue (60s+)</option>
      </select>

      <select id="status-filter">
        <option value="available">Dispo</option>
        <option value="in_use">Utilisé</option>
        <option value="archived">Archivé</option>
        <option value="rejected">Rejeté</option>
        <option value="">Tous statuts</option>
      </select>

      <select id="analysis-filter">
        <option value="">Toutes analyses</option>
        <option value="done">Analysées</option>
        <option value="pending">En attente</option>
        <option value="in_progress">En cours</option>
        <option value="failed">Échec</option>
      </select>

      <button class="btn-reset" id="reset-filters">↻ Réinitialiser</button>
    </div>

    <!-- Ligne 3 : infos + zoom -->
    <div class="filters-row" style="padding-top:6px; padding-bottom:8px;">
      <span class="count-filtered" id="filtered-count"></span>
      <div class="zoom-control" id="zoom-control" aria-label="Densité de la grille">
        <button data-cols="1" title="1 colonne">1</button>
        <button data-cols="2" title="2 colonnes">2</button>
        <button data-cols="3" title="3 colonnes">3</button>
        <button data-cols="4" title="4 colonnes">4</button>
      </div>
    </div>
  </div>

  <div class="gallery" id="gallery">
    <div class="loading">Chargement des clips...</div>
  </div>
</div>

<div class="selection-bar" id="selection-bar">
  <div>
    <div class="count"><span id="sel-count">0</span> clips sélectionnés</div>
    <div class="meta" id="sel-meta">0 sec au total</div>
  </div>
  <div class="actions">
    <button class="btn" id="clear-selection">Vider</button>
    <button class="btn primary" id="send-to-edit">Envoyer vers SomaticaEdit</button>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Clip</h2>
      <button class="close" id="modal-close">&times;</button>
    </div>
    <div class="modal-video">
      <video id="modal-video" controls playsinline></video>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
